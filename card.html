<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Viktor Hartung – HEAT CURVE NEXUS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0c;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2c2c2c;
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* Header – wie App-Header */
    .card-header {
      background: #111;
      border-bottom: 1px solid #2c2c2c;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .logo-build {
      font-size: 9px;
      color: #666;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* Body */
    .card-body {
      padding: 22px 20px 8px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e8501a;
      display: inline-block;
    }

    /* Info-Zeilen – wie App-Cards */
    .info-block {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .info-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
      letter-spacing: .02em;
    }

    .info-value {
      font-size: 15px;
      font-weight: 600;
      color: #f0f0f0;
    }

    .info-value a {
      color: #f0f0f0;
      text-decoration: none;
    }

    .info-value a:hover {
      color: #e8501a;
    }

    /* 2-spaltig wie App */
    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .info-row .info-block {
      margin-bottom: 0;
    }

    /* Footer-Button – wie App-Button */
    .card-footer {
      padding: 12px 20px 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      background: #1e1e1e;
      border: 1px solid #2c2c2c;
      color: #f0f0f0;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      letter-spacing: .02em;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .btn:hover { background: #252525; }

    .btn-accent {
      background: #e8501a;
      border-color: #e8501a;
      color: #fff;
    }

    .btn-accent:hover { background: #d44616; }

    /* Legal Links */
    .legal-links {
      display: flex;
      justify-content: center;
      gap: 18px;
      padding: 10px 20px 16px;
      border-top: 1px solid #222;
    }

    .legal-links a {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      letter-spacing: .04em;
    }

    .legal-links a:hover { color: #888; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Header wie App -->
    <div class="card-header">
      <!-- Flammen-Logo als SVG, nachgebaut nach App-Icon -->
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 36C13 36 8 30.5 8 24.5c0-4 2-7 4.5-9.5C14 16 14 18 15 19c1-4 3-9 8-13 0 4 1.5 6 3.5 8 .5-2 .5-4 0-6 3 3 5.5 7.5 5.5 13 0 1-.1 2-.3 3 1.5-1.5 2.3-3.5 2.3-5.5 2 2.5 2.5 6 2.5 8C36 30.5 27 36 20 36z" fill="white"/>
      </svg>
      <div class="logo-text">
        <span class="logo-title">Heat Curve Nexus</span>
        <span class="logo-build">Build 1.1.0</span>
      </div>
    </div>

    <!-- Inhalt -->
    <div class="card-body">

      <div class="section-label">Kontakt</div>

      <div class="info-block">
        <div class="info-label">Name</div>
        <div class="info-value">Viktor Hartung</div>
      </div>

      <div class="info-block">
        <div class="info-label">E-Mail</div>
        <div class="info-value">
          <a href="mailto:viktor.hartung@icloud.com">viktor.hartung@icloud.com</a>
        </div>
      </div>

      <div class="info-block">
        <div class="info-label">Adresse</div>
        <div class="info-value">Liegnitzer Straße 29, 26127 Oldenburg</div>
      </div>

    </div>

    <!-- Buttons -->
    <div class="card-footer">
      <a class="btn btn-accent" href="mailto:viktor.hartung@icloud.com">Nachricht senden</a>
      <a class="btn" href="support.html">Support</a>
    </div>

    <!-- Legal -->
    <div class="legal-links">
      <a href="privacy.html">Datenschutzerklärung</a>
    </div>

  </div>
</body>
</html>

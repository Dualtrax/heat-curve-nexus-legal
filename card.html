<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Viktor Hartung – Visitenkarte</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      aspect-ratio: 1.75 / 1;
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }

    /* subtiler Hintergrund-Kreis */
    .card::before {
      content: '';
      position: absolute;
      right: -60px;
      top: -60px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,80,26,.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      color: #f5f5f5;
      letter-spacing: -.02em;
      line-height: 1.1;
    }

    .role {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .brand {
      text-align: right;
    }

    .brand-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #e8501a;
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 10px;
      color: #555;
      margin-top: 3px;
      letter-spacing: .05em;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }

    .contact-item svg {
      width: 13px;
      height: 13px;
      fill: #e8501a;
      flex-shrink: 0;
    }

    .contact-item a {
      color: #aaa;
      text-decoration: none;
    }

    .contact-item a:hover {
      color: #f5f5f5;
    }

    .divider-line {
      width: 32px;
      height: 2px;
      background: #e8501a;
      border-radius: 2px;
      align-self: flex-end;
      margin-bottom: 4px;
    }

    .links {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .links a {
      font-size: 10px;
      color: #555;
      text-decoration: none;
      letter-spacing: .04em;
    }

    .links a:hover {
      color: #888;
    }

    /* Mobile: etwas kompakter */
    @media (max-width: 480px) {
      .card {
        aspect-ratio: auto;
        min-height: 220px;
        padding: 24px;
      }
      .name { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div>
        <div class="name">Viktor Hartung</div>
        <div class="role">App-Entwickler</div>
      </div>
      <div class="brand">
        <div class="brand-name">Heat Curve<br>Nexus</div>
        <div class="brand-sub">iOS App</div>
      </div>
    </div>

    <div class="bottom">
      <div class="contact">
        <div class="contact-item">
          <!-- Mail Icon -->
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5zm2 0 6 5 6-5H4zm0 2.4V15h12V7.4l-6 5-6-5z"/>
          </svg>
          <a href="mailto:viktor.hartung@icloud.com">viktor.hartung@icloud.com</a>
        </div>
        <div class="contact-item">
          <!-- Location Icon -->
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 1a6 6 0 0 1 6 6c0 4-6 12-6 12S4 11 4 7a6 6 0 0 1 6-6zm0 2a4 4 0 0 0-4 4c0 2.6 4 8.1 4 8.1S14 9.6 14 7a4 4 0 0 0-4-4zm0 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
          </svg>
          <span>Liegnitzer Str. 29, 26127 Oldenburg</span>
        </div>
      </div>

      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
        <div class="divider-line"></div>
        <div class="links">
          <a href="privacy.html">Datenschutz</a>
          <a href="support.html">Support</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

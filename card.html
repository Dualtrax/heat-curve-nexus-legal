<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Viktor Hartung – HEAT CURVE NEXUS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0c;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Visitenkarte – Querformat */
    .card {
      background: #1a1a1a;
      border: 1px solid #2c2c2c;
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      aspect-ratio: 1.75 / 1;
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Obere Zeile: Logo links, Name rechts */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      color: #f0f0f0;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .logo-build {
      font-size: 9px;
      color: #555;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* Name & Rolle */
    .identity {
      text-align: right;
    }

    .person-name {
      font-size: 19px;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: -.01em;
      line-height: 1.1;
    }

    .person-role {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* Trennlinie */
    .divider {
      border: none;
      border-top: 1px solid #2c2c2c;
    }

    /* Kontaktzeilen */
    .contact {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .contact-item svg {
      width: 13px;
      height: 13px;
      fill: #666;
      flex-shrink: 0;
    }

    .contact-item a,
    .contact-item span {
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
      letter-spacing: .01em;
    }

    .contact-item a:hover { color: #f0f0f0; }

    /* Auf kleinen Screens: Hochformat-Fallback */
    @media (max-width: 400px) {
      .card {
        aspect-ratio: auto;
        min-height: 240px;
        padding: 24px;
      }
      .person-name { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="top">
      <!-- Logo links -->
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Flammen-Silhouette, angelehnt an App-Icon -->
          <path d="
            M20 42
            C11 42 5 35.5 5 28.5
            C5 23.5 7.5 19.5 11 16.5
            C11 19 12 21 13.5 22
            C14.5 17 17 11 22 6
            C22 10.5 24 13 26 15
            C26.8 12.5 26.5 10 25.5 7.5
            C29 11 32 16.5 32 22.5
            C32 23.8 31.8 25 31.5 26
            C33.5 24 34.5 21.5 34.5 19
            C37 22 38 26 38 29
            C38 36 29 42 20 42Z
          " fill="#f0f0f0"/>
        </svg>
        <div class="logo-text">
          <span class="logo-name">Heat Curve<br>Nexus</span>
          <span class="logo-build">Build 1.1.0</span>
        </div>
      </div>

      <!-- Name rechts -->
      <div class="identity">
        <div class="person-name">Viktor Hartung</div>
        <div class="person-role">App-Entwickler</div>
      </div>
    </div>

    <hr class="divider">

    <!-- Kontakt unten links -->
    <div class="contact">
      <div class="contact-item">
        <!-- Mail -->
        <svg viewBox="0 0 20 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 0H2C.9 0 0 .9 0 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V2c0-1.1-.9-2-2-2zm0 4-8 5-8-5V2l8 5 8-5v2z"/>
        </svg>
        <a href="mailto:viktor.hartung@icloud.com">viktor.hartung@icloud.com</a>
      </div>
      <div class="contact-item">
        <!-- Pin -->
        <svg viewBox="0 0 14 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 0C3.1 0 0 3.1 0 7c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5C5.6 9.5 4.5 8.4 4.5 7S5.6 4.5 7 4.5 9.5 5.6 9.5 7 8.4 9.5 7 9.5z"/>
        </svg>
        <span>Liegnitzer Str. 29, 26127 Oldenburg</span>
      </div>
    </div>

  </div>
</body>
</html>

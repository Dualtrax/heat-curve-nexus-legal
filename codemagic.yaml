workflows:
  ios_unsigned_ipa_for_ksign:
    name: iOS unsigned IPA for KSign
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Unzip project
        script: |
          set -e

          ZIP_FILE="HNCV1.1.0_Vollversion_iOS_Header_TrueCenter_Scroll_Final.zip"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "FEHLER: ZIP-Datei nicht gefunden:"
            echo "$ZIP_FILE"
            echo "Vorhandene Dateien:"
            ls -la
            exit 1
          fi

          rm -rf project
          mkdir project

          unzip -q "$ZIP_FILE" -d project

          PROJECT_DIR=$(find project -name "package.json" -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "FEHLER: package.json nicht gefunden."
            find project -maxdepth 5 -type f | head -n 200
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$CM_ENV"
          echo "Projektordner: $PROJECT_DIR"

      - name: Install dependencies
        script: |
          set -e

          cd "$PROJECT_DIR"

          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/ios --save-dev --legacy-peer-deps

          npx cap --version

      - name: Prepare iOS project
        script: |
          set -e

          cd "$PROJECT_DIR"

          if [ ! -d "www" ]; then
            echo "FEHLER: www Ordner fehlt."
            ls -la
            exit 1
          fi

          rm -rf ios

          npx cap add ios
          npx cap sync ios

      - name: Patch iOS WebView bounce
        script: |
          set -e

          cd "$PROJECT_DIR"

          if [ -f "scripts/patch-ios-webview-scroll.sh" ]; then
            bash scripts/patch-ios-webview-scroll.sh
          else
            echo "Warnung: scripts/patch-ios-webview-scroll.sh nicht gefunden."
            echo "Build läuft ohne nativen Bounce-Patch weiter."
          fi

      - name: Install CocoaPods
        script: |
          set -e

          cd "$PROJECT_DIR"

          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          fi

      - name: Build unsigned iOS app
        script: |
          set -e

          cd "$PROJECT_DIR"

          WORKSPACE_PATH=$(find ios -name "App.xcworkspace" | head -n 1)
          PROJECT_PATH=$(find ios -name "App.xcodeproj" | head -n 1)

          if [ -n "$WORKSPACE_PATH" ]; then
            xcodebuild \
              -workspace "$WORKSPACE_PATH" \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build/ios \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          elif [ -n "$PROJECT_PATH" ]; then
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build/ios \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          else
            echo "FEHLER: Keine Xcode-Projektdatei gefunden."
            find ios -maxdepth 6 -type f | sort
            exit 1
          fi

      - name: Package IPA for KSign
        script: |
          set -e

          cd "$PROJECT_DIR"

          APP_PATH=$(find build/ios/Build/Products/Release-iphoneos -maxdepth 2 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "FEHLER: Keine .app gefunden."
            exit 1
          fi

          rm -rf Payload artifacts
          mkdir -p Payload artifacts

          cp -R "$APP_PATH" "Payload/HeatCurveNexus.app"

          /usr/bin/zip -qry "artifacts/HeatCurveNexus-v1.1.0-unsigned-for-KSign.ipa" Payload

          ls -la artifacts

    artifacts:
      - project/**/artifacts/*.ipa
      - project/**/build/ios/Build/Products/Release-iphoneos/*.app

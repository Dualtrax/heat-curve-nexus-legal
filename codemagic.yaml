workflows:
  ios-capacitor-unsigned-check:
    name: iOS Capacitor unsigned build check
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest

    scripts:
      - name: Check tool versions
        script: |
          node -v
          npm -v
          xcodebuild -version

      - name: Clean workspace and unzip project
        script: |
          rm -rf www ios node_modules package.json package-lock.json capacitor.config.json
          unzip -o pv-protokoll_V0.6.119-codemagic-capacitor.zip
          ls -la

      - name: Install npm dependencies
        script: |
          npm install

      - name: Create Capacitor iOS project
        script: |
          rm -rf ios
          npx cap add ios
          ls -la ios
          ls -la ios/App

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods if Podfile exists
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          elif [ -f "ios/Podfile" ]; then
            cd ios
            pod install
          else
            echo "No Podfile found. Skipping CocoaPods. Using SPM/Xcode project."
          fi

      - name: Build iOS app without signing
        script: |
          if [ -f "ios/App/App.xcworkspace/contents.xcworkspacedata" ]; then
            xcodebuild \
              -workspace ios/App/App.xcworkspace \
              -scheme App \
              -configuration Debug \
              -sdk iphoneos \
              -derivedDataPath build/ios \
              CODE_SIGNING_ALLOWED=NO \
              build
          else
            xcodebuild \
              -project ios/App/App.xcodeproj \
              -scheme App \
              -configuration Debug \
              -sdk iphoneos \
              -derivedDataPath build/ios \
              CODE_SIGNING_ALLOWED=NO \
              build
          fi

      - name: Create unsigned IPA
        script: |
          APP_PATH=$(find build/ios/Build/Products/Debug-iphoneos -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found."
            find build/ios -maxdepth 6 -type d
            exit 1
          fi

          echo "Found app: $APP_PATH"

          rm -rf Payload unsigned-ipa
          mkdir -p Payload unsigned-ipa
          cp -R "$APP_PATH" Payload/
          zip -r unsigned-ipa/PV-App-unsigned.ipa Payload

    artifacts:
      - build/ios/Build/Products/Debug-iphoneos/*.app
      - unsigned-ipa/*.ipa

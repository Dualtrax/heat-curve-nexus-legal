workflows:
  ios_unsigned_ipa_for_ksign_from_zip:
    name: iOS unsigned IPA for KSign from ZIP
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Clean workspace and unzip project
        script: |
          set -e

          echo "Repository-Inhalt:"
          ls -la

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "FEHLER: Keine ZIP-Datei im Hauptordner gefunden."
            exit 1
          fi

          echo "Gefundene ZIP-Datei: $ZIP_FILE"

          rm -rf extracted
          mkdir -p extracted

          unzip -q "$ZIP_FILE" -d extracted

          echo "Entpackter Inhalt:"
          find extracted -maxdepth 4 -type f | head -n 200

          PROJECT_DIR=$(find extracted -name "package.json" -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "FEHLER: Keine package.json in der ZIP gefunden."
            exit 1
          fi

          echo "Projektordner gefunden: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$CM_ENV"

      - name: Install npm dependencies and Capacitor
        script: |
          set -e

          cd "$PROJECT_DIR"

          echo "Node:"
          node -v

          echo "NPM:"
          npm -v

          npm install

          npm install @capacitor/core @capacitor/cli @capacitor/ios --save-dev

          npx cap --version

      - name: Ensure Capacitor config
        script: |
          set -e

          cd "$PROJECT_DIR"

          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            cat > capacitor.config.json <<'EOF'
          {
            "appId": "de.hartung.heatcurvenexus",
            "appName": "Heat Curve Nexus",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          fi

          echo "Capacitor Config:"
          cat capacitor.config.json || true

      - name: Ensure www folder
        script: |
          set -e

          cd "$PROJECT_DIR"

          if [ ! -d "www" ]; then
            INDEX_DIR=$(find . -name "index.html" -exec dirname {} \; | head -n 1)

            if [ -z "$INDEX_DIR" ]; then
              echo "FEHLER: Keine index.html gefunden."
              exit 1
            fi

            echo "index.html gefunden in: $INDEX_DIR"

            mkdir -p www

            shopt -s dotglob
            cp -R "$INDEX_DIR"/* www/
          fi

          echo "www-Inhalt:"
          ls -la www | head -n 50

      - name: Create or repair Capacitor iOS project
        script: |
          set -e

          cd "$PROJECT_DIR"

          rm -rf ios

          echo "Erstelle iOS-Projekt..."
          npx cap add ios

          echo "Sync iOS..."
          npx cap sync ios

          echo "iOS-Struktur nach cap add/sync:"
          find ios -maxdepth 4 -type d | sort
          find ios -maxdepth 4 -type f | sort | head -n 200

      - name: Install CocoaPods if available
        script: |
          set -e

          cd "$PROJECT_DIR"

          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
            cd ../..
          else
            echo "Kein Podfile gefunden."
          fi

          echo "Suche Xcode-Dateien:"
          find ios -maxdepth 5 \( -name "*.xcworkspace" -o -name "*.xcodeproj" \) -print

      - name: Build unsigned iOS app
        script: |
          set -e

          cd "$PROJECT_DIR"

          WORKSPACE_PATH=$(find ios -name "App.xcworkspace" | head -n 1)
          PROJECT_PATH=$(find ios -name "App.xcodeproj" | head -n 1)

          if [ -n "$WORKSPACE_PATH" ]; then
            echo "Baue mit Workspace: $WORKSPACE_PATH"

            xcodebuild \
              -workspace "$WORKSPACE_PATH" \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build/ios \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build

          elif [ -n "$PROJECT_PATH" ]; then
            echo "Baue mit Project: $PROJECT_PATH"

            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build/ios \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build

          else
            echo "FEHLER: Keine App.xcworkspace oder App.xcodeproj gefunden."
            echo "iOS-Inhalt:"
            find ios -maxdepth 6 -type f | sort
            exit 1
          fi

      - name: Package unsigned IPA for KSign
        script: |
          set -e

          cd "$PROJECT_DIR"

          APP_PATH=$(find build/ios/Build/Products/Release-iphoneos -maxdepth 2 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "FEHLER: Keine .app gefunden."
            echo "Build-Inhalt:"
            find build/ios/Build/Products -maxdepth 6 -type d || true
            exit 1
          fi

          echo "Gefundene App: $APP_PATH"

          rm -rf Payload artifacts
          mkdir -p Payload artifacts

          cp -R "$APP_PATH" "Payload/HeatCurveNexus.app"

          /usr/bin/zip -qry "artifacts/HeatCurveNexus-v1.1.0-unsigned-for-KSign.ipa" Payload

          echo "IPA erstellt:"
          ls -la artifacts

    artifacts:
      - extracted/**/artifacts/*.ipa
      - extracted/**/build/ios/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log

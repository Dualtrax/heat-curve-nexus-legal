workflows:
  ios_unsigned_ipa_for_ksign:
    name: iOS unsigned IPA for KSign
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Create iOS Capacitor project if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync web app to iOS
        script: |
          npx cap sync ios

      - name: Build unsigned iOS app
        script: |
          set -e
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA for KSign
        script: |
          set -e
          APP_PATH="build/ios/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App.app not found at $APP_PATH"
            find build/ios/Build/Products -maxdepth 4 -type d -name "*.app" || true
            exit 1
          fi
          rm -rf Payload artifacts
          mkdir -p Payload artifacts
          cp -R "$APP_PATH" "Payload/HeatCurveNexus.app"
          /usr/bin/zip -qry "artifacts/HeatCurveNexus-v1.1.0-unsigned-for-KSign.ipa" Payload

    artifacts:
      - artifacts/*.ipa
      - build/ios/Build/Products/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
